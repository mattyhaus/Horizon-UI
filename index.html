<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts for Horizon Midnight Luxe Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    
    <title>Horizon – Your automation team on retainer</title>
  </head>
  <body class="bg-primary text-text font-body antialiased selection:bg-secondary/30 selection:text-text">
    <div id="root"></div>
    <!-- Global CSS Noise Overlay via SVG feTurbulence -->
    <svg style="pointer-events: none; position: fixed; z-index: 50; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.05;" class="pointer-events-none mix-blend-overlay">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
